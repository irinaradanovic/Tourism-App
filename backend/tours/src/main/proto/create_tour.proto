syntax = "proto3";

package tours;

option java_multiple_files = true;
option java_package = "com.tourism.tours.grpc";
option go_package = "./pb";

service TourCommandService {
  rpc CreateTour (CreateTourRequest) returns (CreateTourResponse);
  rpc PublishTour (PublishTourRequest) returns (TourCommandResponse);
}

enum Difficulty {
  DIFFICULTY_UNSPECIFIED = 0;
  EASY = 1;
  MEDIUM = 2;
  HARD = 3;
}

message CreateTourRequest {
  string title = 1;
  string description = 2;
  Difficulty difficulty = 3;
  repeated string tags = 4;
  int64 author_id = 5;
  repeated TourDuration durations = 6;
}

enum TransportType {
  TRANSPORT_UNSPECIFIED = 0;
  WALKING = 1;
  BICYCLE = 2;
  CAR = 3;
}

message TourDuration {
  TransportType transport_type = 1;
  int32 minutes = 2;
}

message PublishTourRequest {
  string tour_id = 1;
  int64 author_id = 2;
  string role = 3;
}

message Tour {
  string id = 1;
  int64 author_id = 2;
  string title = 3;
  string description = 4;
  Difficulty difficulty = 5;
  repeated string tags = 6;
  double price = 7;
  string status = 8;
  double distance_km = 9;
  string published_at = 10;
  string archived_at = 11;
  repeated TourDuration durations = 12;
}

message CreateTourResponse {
  Tour tour = 1;
}

message TourCommandResponse {
  Tour tour = 1;
  string message = 2;
}
