syntax = "proto3";

package tours;
option java_multiple_files = true;
option java_package = "com.tourism.tours.grpc";
option go_package = "./pb"; 

service TourCheckService {
  rpc CheckTour (TourCheckRequest) returns (TourCheckResponse);
}

message TourCheckRequest {
  string tour_id = 1;
}

message TourCheckResponse {
  string status = 1;     
  string tour_name = 2;  
  double price = 3;      
}