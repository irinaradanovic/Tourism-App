syntax = "proto3";

package purchase;

option go_package = "./pb"; 

service CartService {
  //Method for fetching user cart based on tourist Id
  rpc GetCart (CartRequest) returns (CartResponse);
}

message CartRequest {
  int64 tourist_id = 1;
}

message OrderItemProto {
  uint32 id = 1;
  uint32 shopping_cart_id = 2;
  string tour_id = 3;
  string tour_name = 4;
  double price = 5;
}

message CartResponse {
  uint32 id = 1;
  int64 tourist_id = 2;
  double total_price = 3;
  repeated OrderItemProto items = 4;
  string created_at = 5;
  string updated_at = 6;
}