syntax = "proto3";

package purchase;

option go_package = "./pb";

service CheckoutService {
  rpc Checkout (CheckoutRequest) returns (CheckoutResponse);
}

message CheckoutRequest {
  int64 tourist_id = 1;
}

message PurchaseToken {
  uint32 id = 1;
  int64 tourist_id = 2;
  string tour_id = 3;
  string tour_name = 4;
  string created_at = 5;
}

message CheckoutResponse {
  string message = 1;
  repeated PurchaseToken tokens = 2;
}